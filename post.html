<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>خاموشی کی زبان — روشنائی</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        oklch(97% 0.010 80);
      --ink:       oklch(16% 0.010 60);
      --ink-muted: oklch(48% 0.010 60);
      --accent:    oklch(56% 0.095 10);
      --rule:      oklch(84% 0.010 70);
      --bg-quote:  oklch(94% 0.014 78);
      --font-urdu: 'Noto Nastaliq Urdu', serif;
      --font-en:   'EB Garamond', Georgia, serif;
    }

    [data-theme="dark"] {
      --bg:        oklch(12% 0.010 60);
      --ink:       oklch(92% 0.008 70);
      --ink-muted: oklch(58% 0.008 70);
      --rule:      oklch(22% 0.010 60);
      --bg-quote:  oklch(17% 0.012 60);
    }

    html {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-urdu);
      font-size: 19px;
      transition: background 0.3s, color 0.3s;
    }

    body { min-height: 100vh; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 32px;
    }

    /* ── Top bar ── */
    .top-bar {
      padding: 28px 0;
      border-bottom: 1px solid var(--rule);
      animation: fadeUp 0.5s ease both;
    }

    .top-bar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-link {
      font-family: var(--font-en);
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s, gap 0.2s;
    }

    .back-link:hover { color: var(--accent); gap: 10px; }

    .back-arrow {
      display: inline-block;
      transition: transform 0.2s;
    }
    .back-link:hover .back-arrow { transform: translateX(3px); }

    .site-wordmark {
      font-family: var(--font-urdu);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.5;
      transition: color 0.2s;
    }
    .site-wordmark:hover { color: var(--accent); }

    /* ── Post header ── */
    .post-header {
      padding: 64px 0 44px;
      border-bottom: 1px solid var(--rule);
      animation: fadeUp 0.6s 0.1s ease both;
      opacity: 0;
      animation-fill-mode: forwards;
    }

    .post-category {
      font-family: var(--font-en);
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 22px;
      display: block;
    }

    .post-title {
      font-family: var(--font-urdu);
      font-size: clamp(1.9rem, 4.5vw, 3rem);
      font-weight: 700;
      line-height: 1.75;
      color: var(--ink);
      text-wrap: pretty;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 28px;
    }

    .post-date {
      font-family: var(--font-urdu);
      font-size: 0.85rem;
      color: var(--ink-muted);
      line-height: 2;
    }

    .meta-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--rule);
      flex-shrink: 0;
    }

    .post-read-time {
      font-family: var(--font-urdu);
      font-size: 0.82rem;
      color: var(--accent);
      line-height: 2;
    }

    .post-author {
      font-family: var(--font-en);
      font-size: 0.78rem;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
    }

    /* ── Article body ── */
    .post-body {
      padding: 52px 0 0;
      animation: fadeUp 0.6s 0.2s ease both;
      opacity: 0;
      animation-fill-mode: forwards;
    }

    .post-body p {
      font-family: var(--font-urdu);
      font-size: 1rem;
      line-height: 2.6;
      color: var(--ink);
      margin-bottom: 1.8em;
      text-wrap: pretty;
    }

    .post-body h2 {
      font-family: var(--font-urdu);
      font-size: clamp(1.2rem, 2.5vw, 1.55rem);
      font-weight: 600;
      line-height: 2;
      color: var(--ink);
      margin: 2.4em 0 0.8em;
      padding-bottom: 0.4em;
      border-bottom: 1px solid var(--rule);
    }

    .post-body blockquote {
      margin: 2.2em 0;
      padding: 24px 28px 24px 0;
      border-right: 3px solid var(--accent);
      background: var(--bg-quote);
      border-radius: 0 6px 6px 0;
    }

    .post-body blockquote p {
      font-family: var(--font-urdu);
      font-size: 1.05rem;
      line-height: 2.5;
      color: var(--ink);
      font-style: normal;
      margin: 0;
      padding: 0 20px;
    }

    .post-body blockquote cite {
      display: block;
      font-family: var(--font-en);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--ink-muted);
      margin-top: 10px;
      padding: 0 20px;
      font-style: italic;
    }

    /* ── Drop cap on first paragraph ── */
    .post-body > p:first-of-type::first-letter {
      font-size: 3.8em;
      line-height: 0.75;
      float: right;
      margin-left: 10px;
      margin-bottom: 4px;
      color: var(--accent);
      font-weight: 700;
    }

    /* ── End rule ── */
    .post-end-rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 56px 0 0;
      color: var(--rule);
    }

    .post-end-rule::before,
    .post-end-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    .post-end-rule span {
      font-family: var(--font-en);
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
      opacity: 0.5;
    }

    /* ── Post navigation ── */
    .post-nav {
      margin-top: 0;
      padding: 48px 0 80px;
      animation: fadeUp 0.6s 0.3s ease both;
      opacity: 0;
      animation-fill-mode: forwards;
    }

    .post-nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--rule);
      border: 1px solid var(--rule);
      border-radius: 8px;
      overflow: hidden;
    }

    .post-nav-item {
      background: var(--bg);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .post-nav-item:hover { background: var(--bg-quote); }

    .post-nav-item.next { text-align: right; }
    .post-nav-item.prev { text-align: left; }

    .post-nav-label {
      font-family: var(--font-en);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .post-nav-item.next .post-nav-label { justify-content: flex-end; }
    .post-nav-item.prev .post-nav-label { justify-content: flex-start; }

    .post-nav-title {
      font-family: var(--font-urdu);
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 2;
      color: var(--ink);
      transition: color 0.2s;
    }

    .post-nav-item:hover .post-nav-title { color: var(--accent); }

    .post-nav-date {
      font-family: var(--font-urdu);
      font-size: 0.75rem;
      color: var(--ink-muted);
      line-height: 2;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Progress bar ── */
    .read-progress {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      height: 2px;
      background: var(--rule);
      z-index: 100;
    }

    .read-progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accentHue": 10,
  "fontSize": 19,
  "lineHeight": 2.6
}/*EDITMODE-END*/;

const article = {
  category: "خیالات",
  title: "خاموشی کی زبان — جب الفاظ ناکافی ہو جاتے ہیں",
  date: "۲۰ مئی ۲۰۲۵",
  readTime: "۵ منٹ",
  author: "Ahmad Raza",
  body: [
    {
      type: "p",
      text: "کبھی کبھی انسان کے اندر ایسا طوفان اٹھتا ہے جو الفاظ کی زبان نہیں بول سکتا۔ یہ وہ لمحہ ہے جب آنکھیں بھیگتی ہیں لیکن ہونٹ خاموش رہتے ہیں، جب دل چاہتا ہے کہ کچھ کہے لیکن سینے میں ہی گھٹ کر رہ جاتا ہے۔ خاموشی کوئی کمزوری نہیں — یہ وہ زبان ہے جو سب سے گہرے درد اور سب سے بڑی خوشی دونوں کو ایک ساتھ بیان کر سکتی ہے۔"
    },
    {
      type: "p",
      text: "ہم بچپن سے سیکھتے ہیں کہ بولنا ضروری ہے، اظہار کرنا ضروری ہے۔ لیکن کوئی یہ نہیں سکھاتا کہ خاموشی بھی ایک اظہار ہے — شاید سب سے طاقتور اظہار۔ جب کوئی عزیز بیمار پڑ جاتا ہے اور آپ اس کے پاس بیٹھ کر صرف اس کا ہاتھ تھامتے ہیں، تو اس لمحے کوئی لفظ ضروری نہیں ہوتا۔ وہ گرم ہاتھ، وہ موجودگی — یہی سب سے بڑا جملہ ہے۔"
    },
    {
      type: "h2",
      text: "خاموشی اور تنہائی کا فرق"
    },
    {
      type: "p",
      text: "بہت لوگ خاموشی اور تنہائی کو ایک سمجھتے ہیں، لیکن یہ دو بالکل الگ کیفیتیں ہیں۔ تنہائی وہ خلا ہے جو دوسروں کی غیر موجودگی سے پیدا ہوتا ہے — یہ دردناک ہو سکتا ہے، ادھورا لگ سکتا ہے۔ لیکن خاموشی اپنے اندر اترنے کا نام ہے۔ یہ وہ آواز ہے جو شور کے بند ہونے کے بعد سنائی دیتی ہے — اپنے آپ کی آواز، اپنے دل کی دھڑکن کی آواز۔"
    },
    {
      type: "blockquote",
      text: "خاموشی وہ آئینہ ہے جس میں ہم خود کو دیکھتے ہیں — بغیر کسی زیب و زینت کے، بغیر کسی لیپا پوتی کے۔ اور اکثر یہ دیکھنا اتنا سچا ہوتا ہے کہ برداشت کرنا مشکل ہو جاتا ہے۔",
      cite: "— ایک ادھوری ڈائری سے"
    },
    {
      type: "h2",
      text: "الفاظ کی حدود"
    },
    {
      type: "p",
      text: "الفاظ بہت طاقتور ہیں، یہ سچ ہے۔ لیکن ان کی بھی ایک حد ہے۔ جب کوئی پیارا رخصت ہو جاتا ہے تو 'مجھے افسوس ہے' کتنا کھوکھلا لگتا ہے۔ جب کوئی بہت خوش ہو تو ہنسی کے علاوہ کوئی لفظ اس کیفیت کو پوری طرح بیان نہیں کر پاتا۔ یہ وہ مقامات ہیں جہاں زبان ہار مان لیتی ہے اور خاموشی آگے بڑھتی ہے۔"
    },
    {
      type: "p",
      text: "شاعروں نے ہمیشہ اس حقیقت کو محسوس کیا ہے۔ غالب نے کہا تھا کہ بعض اوقات جو بات کہی نہیں جا سکتی، وہی سب سے زیادہ کہنے کی ضرورت ہوتی ہے۔ میر تقی میر کی شاعری میں بھی یہی خاموشی بولتی ہے — ایک ایسی خاموشی جو ہر لفظ کے پیچھے چھپی رہتی ہے اور اصل مطلب وہاں ہوتا ہے جہاں لفظ ختم ہوتے ہیں۔"
    },
    {
      type: "h2",
      text: "خاموشی سننا سیکھیں"
    },
    {
      type: "p",
      text: "آج کی دنیا میں ہم سب بولنے میں مصروف ہیں۔ سوشل میڈیا پر، گھروں میں، دفتروں میں — ہر طرف شور ہے۔ لیکن اگر آپ کبھی پانچ منٹ کے لیے سب کچھ بند کر کے بس بیٹھ جائیں — فون نیچے رکھ دیں، آنکھیں بند کریں — تو آپ کو احساس ہوگا کہ خاموشی کتنی بھری ہوئی ہے۔ اس میں پرانی یادیں ہیں، ادھورے خواب ہیں، اور وہ سوالات ہیں جن کا جواب ہم عرصے سے ڈھونڈ رہے ہیں۔"
    },
    {
      type: "p",
      text: "خاموشی کو سننا ایک فن ہے — ایسا فن جو ہم بھول چکے ہیں۔ اسے دوبارہ سیکھنا ضروری ہے، نہ صرف اپنی خاموشی کو بلکہ دوسروں کی خاموشی کو بھی۔ کیونکہ جب کوئی خاموش ہو جاتا ہے تو اکثر اس کی خاموشی میں سب سے بڑا پیغام چھپا ہوتا ہے۔"
    }
  ]
};

const nextPost = {
  title: "پرانی کتابوں کی خوشبو اور یادوں کا سفر",
  date: "۱۲ مئی ۲۰۲۵",
};

const prevPost = {
  title: "شہر کی رات اور ایک مسافر کی سوچیں",
  date: "۳ مئی ۲۰۲۵",
};

function ReadProgress() {
  const [progress, setProgress] = useState(0);

  useEffect(() => {
    const onScroll = () => {
      const el = document.documentElement;
      const scrolled = el.scrollTop;
      const total = el.scrollHeight - el.clientHeight;
      setProgress(total > 0 ? (scrolled / total) * 100 : 0);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <div className="read-progress">
      <div className="read-progress-fill" style={{ width: progress + '%' }}></div>
    </div>
  );
}

function ArticleBlock({ block, lineHeight }) {
  if (block.type === 'p') {
    return <p style={{ lineHeight }}>{block.text}</p>;
  }
  if (block.type === 'h2') {
    return <h2>{block.text}</h2>;
  }
  if (block.type === 'blockquote') {
    return (
      <blockquote>
        <p style={{ lineHeight }}>{block.text}</p>
        {block.cite && <cite>{block.cite}</cite>}
      </blockquote>
    );
  }
  return null;
}

function App() {
  const [tweaks, setTweakRaw] = useTweaks(TWEAK_DEFAULTS);
  const setTweak = (key, val) => setTweakRaw(key, val);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme);
  }, [tweaks.theme]);

  useEffect(() => {
    document.documentElement.style.fontSize = tweaks.fontSize + 'px';
  }, [tweaks.fontSize]);

  useEffect(() => {
    const h = tweaks.accentHue;
    const isDark = tweaks.theme === 'dark';
    const l = isDark ? '68%' : '56%';
    document.documentElement.style.setProperty('--accent', `oklch(${l} 0.095 ${h})`);
  }, [tweaks.accentHue, tweaks.theme]);

  return (
    <>
      <ReadProgress />

      {/* TOP BAR */}
      <div className="top-bar">
        <div className="container">
          <div className="top-bar-inner">
            <a href="index.html" className="back-link">
              <span className="back-arrow">→</span> All posts
            </a>
            <a href="index.html" className="site-wordmark">روشنائی</a>
          </div>
        </div>
      </div>

      {/* POST HEADER */}
      <header className="post-header">
        <div className="container">
          <span className="post-category">{article.category}</span>
          <h1 className="post-title">{article.title}</h1>
          <div className="post-meta">
            <span className="post-date">{article.date}</span>
            <span className="meta-dot"></span>
            <span className="post-read-time">{article.readTime}</span>
            <span className="meta-dot"></span>
            <span className="post-author">{article.author}</span>
          </div>
        </div>
      </header>

      {/* ARTICLE BODY */}
      <article className="post-body">
        <div className="container">
          {article.body.map((block, i) => (
            <ArticleBlock key={i} block={block} lineHeight={tweaks.lineHeight} />
          ))}

          <div className="post-end-rule">
            <span>— ختم شد —</span>
          </div>
        </div>
      </article>

      {/* POST NAVIGATION */}
      <nav className="post-nav">
        <div className="container">
          <div className="post-nav-grid">
            <a href="#" className="post-nav-item next">
              <span className="post-nav-label">
                اگلی تحریر →
              </span>
              <span className="post-nav-title">{nextPost.title}</span>
              <span className="post-nav-date">{nextPost.date}</span>
            </a>
            <a href="#" className="post-nav-item prev">
              <span className="post-nav-label">
                ← پچھلی تحریر
              </span>
              <span className="post-nav-title">{prevPost.title}</span>
              <span className="post-nav-date">{prevPost.date}</span>
            </a>
          </div>
        </div>
      </nav>

      {/* TWEAKS */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Appearance">
          <TweakRadio
            label="Theme"
            value={tweaks.theme}
            options={[{ value: 'light', label: 'Light' }, { value: 'dark', label: 'Dark' }]}
            onChange={v => setTweak('theme', v)}
          />
          <TweakSlider
            label="Accent Hue"
            value={tweaks.accentHue}
            min={0} max={360} step={5}
            onChange={v => setTweak('accentHue', v)}
          />
        </TweakSection>
        <TweakSection label="Reading">
          <TweakSlider
            label="Font Size"
            value={tweaks.fontSize}
            min={16} max={23} step={1}
            unit="px"
            onChange={v => setTweak('fontSize', v)}
          />
          <TweakSlider
            label="Line Height"
            value={tweaks.lineHeight}
            min={2.0} max={3.2} step={0.1}
            onChange={v => setTweak('lineHeight', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}
